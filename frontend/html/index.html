<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThreatProbe Scanner</title>
  <link rel="stylesheet" href="/css/styles.css?v=12" />
</head>
<body>
  <!-- Login view -->
  <div id="login-view" class="login-wrap">
    <form id="login-form" class="login-card">
      <div class="login-logo">🛡️</div>
      <h1>ThreatProbe Scanner</h1>
      <p class="muted">Air-Gapped Vulnerability Assessment &amp; Penetration Testing</p>
      <input id="login-username" type="text" placeholder="Username" autocomplete="username" required />
      <input id="login-password" type="password" placeholder="Password" autocomplete="current-password" required />
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      <div id="login-error" class="error-msg"></div>
      <p class="muted small" style="margin-top:14px">© 2026 ThreatProbe Scanner</p>
    </form>
  </div>

  <!-- App shell -->
  <div id="app-view" class="hidden">
    <aside class="sidebar">
      <div class="brand">🛡️ <span>ThreatProbe Scanner</span></div>
      <nav id="nav">
        <a data-route="dashboard" class="nav-item active">📊 Dashboard</a>
        <a data-route="targets" class="nav-item">🎯 Targets</a>
        <a data-route="scans" class="nav-item">🔍 Scans</a>
        <a data-route="cves" class="nav-item">🐞 CVE Database</a>
        <a data-route="reports" class="nav-item">📄 Reports</a>
        <a data-route="settings" class="nav-item admin-only">📧 Settings</a>
        <a data-route="users" class="nav-item admin-only">👤 Users</a>
      </nav>
      <div class="sidebar-footer">
        <div id="user-badge" class="user-badge"></div>
        <button id="theme-btn" class="btn btn-ghost btn-block" style="margin-bottom:8px">🌙 Dark / Light</button>
        <button id="logout-btn" class="btn btn-ghost btn-block">Logout</button>
        <div class="muted small" style="margin-top:10px;text-align:center">© 2026 ThreatProbe Scanner</div>
      </div>
    </aside>
    <main class="content">
      <div id="toast" class="toast hidden"></div>
      <div id="view"></div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="/js/api.js?v=12"></script>
  <script src="/js/app.js?v=12"></script>
</body>
</html>
