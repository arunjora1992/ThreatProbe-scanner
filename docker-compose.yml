services:
  db:
    image: postgres:16-alpine
    container_name: pentest_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pentest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pentest}
      POSTGRES_DB: ${POSTGRES_DB:-pentest}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pentest}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: pentest_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-pentest}:${POSTGRES_PASSWORD:-pentest}@db:5432/${POSTGRES_DB:-pentest}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-please-use-a-long-random-string}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CVE_FEED_DIR: /data/cve_feeds
      # Authenticated ZAP scans run in the backend (creds stay in-memory), so the
      # backend talks to the ZAP daemon directly too.
      ZAP_API_URL: http://zap:8090
      # Offline AI assistant — local llama.cpp server (OpenAI-compatible API).
      LLM_API_URL: http://llm:8091
    volumes:
      # Persistent host bind mount for ALL feed data — survives container rebuilds/recreates:
      #   /data/cve_feeds/*.json[.gz]              NVD CVE feeds + CVE-DB exports/uploads
      #   /data/cve_feeds/known_exploited_*.json   CISA KEV
      #   /data/cve_feeds/epss_scores-current.*    FIRST EPSS
      #   /data/cve_feeds/distro_feeds/*           vendor OVAL (RHEL/Oracle/Ubuntu …)
      # Online "Import" buttons also WRITE the downloaded files here, so a connected host
      # can produce exactly the files an air-gapped host needs (copy ./data across).
      - ./data:/data
      # Share the host server's /etc/hosts (read-only) so scan targets named there
      # resolve inside the container. Inter-service names (db, zap) resolve via Docker's
      # embedded DNS, not /etc/hosts, so this doesn't affect them.
      - /etc/hosts:/etc/hosts:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: ./backend
    container_name: pentest_worker
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-pentest}:${POSTGRES_PASSWORD:-pentest}@db:5432/${POSTGRES_DB:-pentest}
      CVE_FEED_DIR: /data/cve_feeds
      ZAP_API_URL: http://zap:8090
    volumes:
      - ./data:/data
      # Resolve host-server /etc/hosts target names inside the worker (nmap / SSH scans).
      - /etc/hosts:/etc/hosts:ro
    # nmap SYN scans need NET_RAW/NET_ADMIN. The default profiles use TCP connect
    # (-sT) which works without these, but granting them enables faster -sS scans.
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # OWASP ZAP daemon — web-application scanning engine (driven via REST API by the worker).
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: pentest_zap
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8090
      -config api.disablekey=true
      -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true
      -config scanner.attackOnStart=false
      -config database.recoverylog=false
      -config database.compactOnExit=true
      -config scanner.threadPerHost=2
      -config spider.thread=2
    environment:
      # Hard-bound ALL JVM memory pools so an active scan's RSS (heap + direct buffers +
      # metaspace + threads) stays well under the cgroup limit. Active scanning spikes
      # memory; without these caps it OOM-killed the container.
      JAVA_TOOL_OPTIONS: "-Xmx1280m -XX:MaxDirectMemorySize=384m -XX:MaxMetaspaceSize=256m -XX:+UseContainerSupport"
    # The AJAX spider (JS/SPA crawling) launches a headless Firefox inside this container.
    # Browsers crash on the Docker default 64 MB /dev/shm, and their sandbox needs to
    # create user namespaces (blocked by the default seccomp profile) — without these two
    # the browser dies and takes the ZAP daemon down with it (the OOM/restart we hit).
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    volumes:
      # Resolve host-server /etc/hosts target names inside ZAP (web scans hit targets by name).
      - /etc/hosts:/etc/hosts:ro
    mem_limit: 4g
    memswap_limit: 4g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/JSON/core/view/version/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  # Offline AI assistant — llama.cpp server exposing an OpenAI-compatible API, serving a
  # quantized GGUF from ./data/models (air-gap friendly: copy that folder across). The
  # backend grounds every answer on the local CVE DB / findings (RAG) so the model phrases
  # facts rather than recalling them, and is model-agnostic.
  #
  # MODEL SWAP (no code/compose edits): the container auto-loads the LARGEST *.gguf present
  # in ./data/models. To upgrade, drop a bigger model (e.g. Qwen2.5-3B/7B-Instruct Q4) into
  # data/models/ and run `docker compose up -d llm`. Bump mem_limit for larger models
  # (≈3g for 1.5B, ≈5g for 3B, ≈8g for 7B).
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: pentest_llm
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        MODEL="";
        if [ -f /models/.active ]; then SEL="$$(cat /models/.active)"; [ -f "/models/$$SEL" ] && MODEL="/models/$$SEL"; fi;
        [ -z "$$MODEL" ] && MODEL="$$(ls -S /models/*.gguf 2>/dev/null | head -n1)";
        echo "Loading model: $$MODEL";
        exec /app/llama-server -m "$$MODEL" -c 4096 --threads 4 --host 0.0.0.0 --port 8091
    volumes:
      - ./data/models:/models:ro
    mem_limit: 5g
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: pentest_frontend
    environment:
      # Public HTTPS port — used to build the HTTP->HTTPS redirect target.
      PUBLIC_HTTPS_PORT: ${FRONTEND_HTTPS_PORT:-8443}
    ports:
      - "${FRONTEND_PORT:-8080}:80"          # HTTP — redirects to HTTPS
      - "${FRONTEND_HTTPS_PORT:-8443}:443"   # HTTPS (self-signed certificate)
    volumes:
      # Persist the self-signed cert across container recreates so the browser
      # doesn't have to re-trust a new cert each rebuild. Generated on first start.
      - frontendcerts:/etc/nginx/certs
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontendcerts:
  pgdata:
